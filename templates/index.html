<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuQuery - Chat with your PDF</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #f0f0f0; height: 100vh; display: flex; flex-direction: column; }
        header { padding: 20px 40px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 12px; }
        header h1 { font-size: 1.4rem; font-weight: 600; }
        header span { font-size: 1.6rem; }
        .main { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 280px; background: #161616; border-right: 1px solid #222; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
        .sidebar h2 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: #888; }
        .upload-area { border: 2px dashed #333; border-radius: 12px; padding: 24px; text-align: center; cursor: pointer; transition: all 0.2s; }
        .upload-area:hover { border-color: #555; background: #1a1a1a; }
        .upload-area p { font-size: 0.85rem; color: #888; margin-top: 8px; }
        .upload-area input { display: none; }
        .upload-btn { background: #2563eb; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 0.9rem; font-weight: 500; transition: background 0.2s; }
        .upload-btn:hover { background: #1d4ed8; }
        .status { font-size: 0.8rem; color: #888; text-align: center; min-height: 20px; }
        .status.success { color: #22c55e; }
        .status.error { color: #ef4444; }
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        .messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
        .message { max-width: 70%; padding: 12px 16px; border-radius: 12px; font-size: 0.9rem; line-height: 1.5; }
        .message.user { background: #2563eb; align-self: flex-end; border-bottom-right-radius: 4px; }
        .message.bot { background: #1e1e1e; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #2a2a2a; }
        .message.bot.loading { color: #888; }
        .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #444; gap: 12px; }
        .empty-state span { font-size: 3rem; }
        .input-area { padding: 20px 24px; border-top: 1px solid #222; display: flex; gap: 12px; }
        .input-area input { flex: 1; background: #1e1e1e; border: 1px solid #2a2a2a; border-radius: 10px; padding: 12px 16px; color: #f0f0f0; font-size: 0.9rem; outline: none; transition: border 0.2s; }
        .input-area input:focus { border-color: #2563eb; }
        .input-area input::placeholder { color: #555; }
        .send-btn { background: #2563eb; border: none; border-radius: 10px; padding: 12px 20px; cursor: pointer; color: white; font-size: 1rem; transition: background 0.2s; }
        .send-btn:hover { background: #1d4ed8; }
        .send-btn:disabled { background: #1e3a6e; cursor: not-allowed; }
    </style>
</head>
<body>
    <header>
        <span>📄</span>
        <h1>DocuQuery</h1>
    </header>
    <div class="main">
        <div class="sidebar">
            <h2>Upload Document</h2>
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <span style="font-size:2rem">📁</span>
                <p>Click to select a PDF</p>
                <input type="file" id="fileInput" accept=".pdf" onchange="uploadFile()">
            </div>
            <button class="upload-btn" onclick="document.getElementById('fileInput').click()">Choose PDF</button>
            <p class="status" id="status">No document loaded</p>
        </div>
        <div class="chat-area">
            <div class="messages" id="messages">
                <div class="empty-state">
                    <span>💬</span>
                    <p>Upload a PDF and start asking questions</p>
                </div>
            </div>
            <div class="input-area">
                <input type="text" id="questionInput" placeholder="Ask a question about your document..." onkeypress="if(event.key==='Enter') askQuestion()">
                <button class="send-btn" id="sendBtn" onclick="askQuestion()">➤</button>
            </div>
        </div>
    </div>

    <script>
    let pdfLoaded = false;

    async function uploadFile() {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return;
        const status = document.getElementById('status');
        status.className = 'status';
        status.textContent = 'Uploading...';
        const formData = new FormData();
        formData.append('file', file);
        try {
            const res = await fetch('/upload', { method: 'POST', body: formData });
            const data = await res.json();
            if (data.success) {
                status.className = 'status success';
                status.textContent = `✓ ${file.name} loaded`;
                pdfLoaded = true;
                document.getElementById('messages').innerHTML = '';
                addMessage('bot', `Document loaded! I've read "${file.name}". Ask me anything about it.`);
            } else {
                status.className = 'status error';
                status.textContent = 'Upload failed. Try again.';
            }
        } catch {
            status.className = 'status error';
            status.textContent = 'Something went wrong.';
        }
    }

    async function askQuestion() {
        const input = document.getElementById('questionInput');
        const question = input.value.trim();
        if (!question) return;
        if (!pdfLoaded) { addMessage('bot', 'Please upload a PDF first!'); return; }
        
        addMessage('user', question);
        input.value = '';
        
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'message bot loading';
        loadingDiv.textContent = 'Thinking...';
        document.getElementById('messages').appendChild(loadingDiv);
        document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        
        document.getElementById('sendBtn').disabled = true;
        
        try {
            const res = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question })
            });
            const data = await res.json();
            loadingDiv.remove();
            addMessage('bot', data.answer || 'Sorry, I could not find an answer.');
        } catch {
            loadingDiv.remove();
            addMessage('bot', 'Something went wrong. Try again.');
        }
        document.getElementById('sendBtn').disabled = false;
    }

    function addMessage(type, text) {
        const messages = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = `message ${type}`;
        div.textContent = text;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }

    document.getElementById('questionInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') askQuestion();
    });
</script>
